// ─────────────────────────────────────────────
//  FIX 1 — PARSER CSV ROBUSTO
//  Maneja celdas vacías, comillas escapadas y
//  filas con distinto número de columnas.
// ─────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim() !== "");
  if (!lines.length) return { header:[], rows:[] };

  function splitLine(line) {
    const result = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (inQ) {
        if (ch === '"' && line[i+1] === '"') { cur += '"'; i++; }
        else if (ch === '"') { inQ = false; }
        else { cur += ch; }
      } else {
        if (ch === '"') { inQ = true; }
        else if (ch === ',') { result.push(cur.trim()); cur = ""; }
        else { cur += ch; }
      }
    }
    result.push(cur.trim());
    return result;
  }

  const header = splitLine(lines[0]);
  const rows = lines.slice(1).map(l => {
    const r = splitLine(l);
    // Rellenar o recortar para que siempre coincida con el header
    while (r.length < header.length) r.push("");
    return r.slice(0, header.length);
  });
  return { header, rows };
}

// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
function extractMonthIndexFromRow(row) {
  const hN = GLOBAL.header.map(normKey);
  const iF = hN.indexOf("fecha");
  const cell = String(row[iF !== -1 ? iF : 0] || "").trim();

  // DD/MM/YYYY o DD-MM-YYYY
  let m = cell.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
  if (m) { const mn = parseInt(m[2],10); if (!isNaN(mn) && mn>=1 && mn<=12) return mn-1; }
  // YYYY-MM-DD
  m = cell.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})/);
  if (m) { const mn = parseInt(m[2],10); if (!isNaN(mn) && mn>=1 && mn<=12) return mn-1; }
  return 99;
}

    ["14/02/2026","8","Herrera, Rolando","45","Noche","Sur","Activo","17232"],
    ["03/03/2026","11","Herrera, Rolando","62","Día","Este","Activo","17232"],
    ["05/03/2026","9","Herrera, Rolando","64","Noche","Norte","Activo","17232"],
    ["08/03/2026","10","Herrera, Rolando","67","Día","Sur","Activo","17232"],
  ];
  return { header, rows };
}

// ─────────────────────────────────────────────
//  FETCH + FILTRADO
// ─────────────────────────────────────────────
async function fetchAndFilterData(numContrato) {
  const loader     = document.getElementById('loader');
  const dataCont   = document.getElementById('data-container');
  const statusNote = document.getElementById('status-note');
  const detailExtras = document.getElementById('detail-extras');

  loader.style.display = 'block';
  dataCont.style.display = 'none';
  detailExtras.style.display = 'none';
  statusNote.textContent = "Conectando y procesando datos...";
  GLOBAL.isFallback = false;
  GLOBAL.rawCSV = "";
  GLOBAL.header = [];
  GLOBAL.rows = [];
  GLOBAL.filteredRows = [];
  GLOBAL.visibleColIdx = [];

  try {
    const res = await fetch(CSV_URL, { cache:"no-store" });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    GLOBAL.rawCSV = text;
    const parsed = parseCSV(text);
    // FIX 4 — limpiar espacios en los headers
    GLOBAL.header = parsed.header.map(h => h.trim());
    GLOBAL.rows   = parsed.rows;
    statusNote.textContent = "Datos cargados.";
  } catch(err) {
    console.warn("Fallback:", err);
    GLOBAL.isFallback = true;
    statusNote.textContent = "⚠️ Datos de ejemplo — sin conexión al CSV.";
    const fake = getFakeData();
    GLOBAL.header = fake.header;
    GLOBAL.rows   = fake.rows;
  }

  // FIX 3 — filtro normalizado
  GLOBAL.filteredRows = GLOBAL.rows.filter(r =>
    r.some(c => String(c).trim().replace(/\s+/g,"") === String(numContrato).trim())
  );

  // Calcular columnas visibles (excluir las columnas definidas)
  const hN = GLOBAL.header.map(normKey);
  GLOBAL.visibleColIdx = hN
    .map((k, i) => ({ k, i }))
    .filter(({ k }) => !COLS_EXCLUIDAS.includes(k))
    .map(({ i }) => i);

  buildDetailTable(GLOBAL.header, GLOBAL.filteredRows);
  buildDetailExtras(GLOBAL.header, GLOBAL.filteredRows);
  buildSummary(GLOBAL.filteredRows);

  loader.style.display = 'none';
  dataCont.style.display = 'block';
}

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────
function normKey(s) { return String(s).trim().toLowerCase().replace(/\s+/g,'_'); }

// Etiquetas amigables para los headers
function getLabel(k) {
  const labels = {
    fecha:"Fecha", nombre_transportista:"Transportista",
    turno:"Turno", frente:"Frente", contrato:"Contrato"
  };
  return labels[normKey(k)] || k;
}

function formatCell(colKey, value) {
  const k   = normKey(colKey);
  const raw = value ?? "";
  const v   = escHtml(raw);
  if (k === "turno") {
    const lv  = String(raw).toLowerCase();
    const cls = lv.startsWith("n") ? "turno-n" : "turno-d";
    return `<span class="turno-badge ${cls}">${v}</span>`;
  }
  if (k === "frente")
    return `<span class="frente-badge">${v}</span>`;
  if (k === "nombre_transportista")
    return `<span class="trans-cell">${v}</span>`;
  if (k === "fecha")
    return `<span class="fecha-cell">${v}</span>`;
  return v;
}

// ─────────────────────────────────────────────
//  TABLA DETALLE
//  - Sin reordenar columnas (orden del CSV)
//  - Excluye status, viajes, dia_zafra
//  - Cuenta registros como viajes
// ─────────────────────────────────────────────
function buildDetailTable(header, rows) {
  const table  = document.getElementById('tabla-maestra');
  const visIdx = GLOBAL.visibleColIdx;

  if (!header.length || !visIdx.length) {
    table.innerHTML = "<tr><td>Sin cabeceras</td></tr>";
    return;
  }

  const visHead = visIdx.map(i => header[i]);
  const nc      = visHead.length;

  // Agrupar por mes
  const grouped = {};
  rows.forEach(r => {
    const mi = extractMonthIndexFromRow(r);
    if (!grouped[mi]) grouped[mi] = [];
    grouped[mi].push(r);
  });
  const keys = Object.keys(grouped).map(k => parseInt(k,10)).sort((a,b)=>a-b);

  if (!keys.length) {
    table.innerHTML = `<tr><td colspan="${nc}"><div class="loader">⚠️ No se encontraron viajes para este contrato.</div></td></tr>`;
    return;
  }

  let html = `<tr class="header-row">${visHead.map(h=>`<td>${escHtml(getLabel(h))}</td>`).join("")}</tr>`;
  let grand = 0;

  keys.forEach(mIdx => {
    const mn    = MESES[mIdx] || "SIN FECHA";
    const mRows = grouped[mIdx];
    grand += mRows.length;

    html += `<tr class="month-divider"><td colspan="${nc}">${mn} — ${mRows.length} viaje${mRows.length!==1?'s':''}</td></tr>`;

    mRows.forEach(row => {
      html += `<tr class="data-row">${visIdx.map((origIdx, pos) =>
        `<td>${formatCell(visHead[pos], row[origIdx] ?? '')}</td>`
      ).join("")}</tr>`;
    });

    html += `<tr class="subtotal-row"><td colspan="${nc}">
      <div class="subtotal-inner">
        <span>Subtotal ${mn}:</span>
        <span class="count-badge">${mRows.length}</span>
      </div></td></tr>`;
  });

  html += `<tr class="grand-total-row"><td colspan="${nc}">
    <div class="gtotal-inner">
      <span>TOTAL DE VIAJES:</span>
      <span class="count-badge" style="background:var(--accent);color:var(--navy)">${grand}</span>
    </div></td></tr>`;

  table.innerHTML = html;
}

// ─────────────────────────────────────────────
//  EXTRAS DEL RESUMEN (turno y frente)
//  Sin datos de jornadas
// ─────────────────────────────────────────────
function buildDetailExtras(header, rows) {
  const container = document.getElementById('detail-extras');
  if (!rows.length) { container.innerHTML=""; container.style.display="none"; return; }

  const hN = header.map(normKey);
  const iT = hN.indexOf("turno");
  const iF = hN.indexOf("frente");

  let h = "";

  if (iT !== -1) {
    const turnos = {};
    rows.forEach(r => {
      const t = String(r[iT]||"N/D").trim();
      turnos[t] = (turnos[t]||0)+1;
    });
    const tRows = Object.entries(turnos).map(([t,n]) => {
      const cls = t.toLowerCase().startsWith("n") ? "turno-n" : "turno-d";
      return `<div class="stat-row"><span class="turno-badge ${cls}">${escHtml(t)}</span><strong>${n}</strong></div>`;
    }).join("");
    h += `<div class="stat-box-light"><div class="lbl-head">Por turno</div>${tRows}</div>`;
  }

  if (iF !== -1) {
    const frentes = {};
    rows.forEach(r => {
      const f = String(r[iF]||"N/D").trim();
      frentes[f] = (frentes[f]||0)+1;
    });
    const fRows = Object.entries(frentes).sort((a,b)=>b[1]-a[1]).map(([f,n]) =>
      `<div class="stat-row"><span class="frente-badge">${escHtml(f)}</span><strong>${n}</strong></div>`
    ).join("");
    h += `<div class="stat-box-light"><div class="lbl-head">Por frente</div>${fRows}</div>`;
  }

  container.innerHTML = h;
  container.style.display = h ? "grid" : "none";
}

// ─────────────────────────────────────────────
//  RESUMEN — solo total de viajes (= registros)
//  Sin métricas de jornadas
// ─────────────────────────────────────────────
function buildSummary(rows) {
  // Métricas superiores
  const totalViajes = rows.length;
  const counts = {};
  rows.forEach(r => {
    const k = MESES[extractMonthIndexFromRow(r)] || "SIN FECHA";
    counts[k] = (counts[k]||0)+1;
  });
  const meses = Object.keys(counts).length;
  const avg   = meses === 0 ? 0 : Math.round(totalViajes/meses);

  const sc = document.getElementById('summary-cards');
  sc.innerHTML = "";
  [
    ["Total de Viajes", totalViajes],
    ["Meses con Actividad", meses],
    ["Prom. Viajes / Mes", avg]
  ].forEach(([t,v]) => {
    const d = document.createElement('div');
    d.className = 'metric';
    d.innerHTML = `<h3>${escHtml(String(v))}</h3><p>${escHtml(t)}</p>`;
    sc.appendChild(d);
  });

  // Tabla por mes
  const st = document.getElementById('summary-table');
  let html = `<tr class="header-row"><td>Mes</td><td>Viajes</td></tr>`;

  Object.keys(counts).sort((a,b) => {
    const ia = MESES.indexOf(a), ib = MESES.indexOf(b);
    if(ia===-1&&ib===-1) return a.localeCompare(b);
    if(ia===-1) return 1; if(ib===-1) return -1;
    return ia-ib;
  }).forEach(m => {
    html += `<tr class="data-row">
      <td>${escHtml(m)}</td>
      <td><span class="count-badge">${counts[m]}</span></td>
    </tr>`;
  });

  html += `<tr class="grand-total-row">
    <td>Total</td>
    <td><span class="count-badge" style="background:var(--accent);color:var(--navy)">${totalViajes}</span></td>
  </tr>`;
  st.innerHTML = html;
}

// ─────────────────────────────────────────────
//  TABS
// ─────────────────────────────────────────────
function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  document.getElementById('panel-resumen').style.display  = tab==='resumen'  ? 'block':'none';
  document.getElementById('panel-detalles').style.display = tab==='detalles' ? 'block':'none';
}

// ─────────────────────────────────────────────
//  EXPORT PDF
// ─────────────────────────────────────────────
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'portrait', unit:'pt', format:'letter' });
  const PW  = doc.internal.pageSize.getWidth();
  const PH  = doc.internal.pageSize.getHeight();
  const M   = 40;

  const contrato    = GLOBAL.currentContrato || "—";
  const userName    = (sessionStorage.getItem('userName')||"").toUpperCase();
  const now         = new Date();
  const anio        = now.getFullYear();
  const fechaEmision = now.toLocaleDateString('es-PA',{day:'2-digit',month:'long',year:'numeric'});

  const header  = GLOBAL.header;
  const rows    = GLOBAL.filteredRows;
  const visIdx  = GLOBAL.visibleColIdx;
  const visHead = visIdx.map(i => header[i]);

  function drawFooter() {
    const pg  = doc.internal.getCurrentPageInfo().pageNumber;
    const tot = doc.internal.getNumberOfPages();
    doc.setDrawColor(210,220,240);
    doc.line(M, PH-28, PW-M, PH-28);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(160);
    doc.text(`Página ${pg} de ${tot}`, PW-M, PH-16, {align:'right'});
    doc.text(`CADASA | Contrato ${contrato} | Generado: ${fechaEmision}`, M, PH-16);
  }

  // Encabezado
  doc.setFillColor(11,29,58); doc.rect(0,0,PW,75,'F');
  doc.setTextColor(255,193,7); doc.setFont('helvetica','bold'); doc.setFontSize(16);
  doc.text('CADASA – CONTROL DE TRANSPORTE', M, 28);
  doc.setFontSize(9); doc.setTextColor(200,215,240);
  doc.text('Informe oficial de viajes registrados', M, 46);
  doc.setTextColor(255,193,7); doc.setFontSize(10);
  doc.text(`Año: ${anio}`, M, 62);

  // Bloque transportista
  let y = 90;
  doc.setFillColor(245,248,255); doc.roundedRect(M,y,PW-M*2,68,6,6,'F');
  doc.setDrawColor(210,225,250); doc.roundedRect(M,y,PW-M*2,68,6,6,'S');
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(130,150,185);
  doc.text('TRANSPORTISTA', M+10, y+14);
  doc.text('N° DE CONTRATO', M+230, y+14);
  doc.text('FECHA DE EMISIÓN', M+330, y+14);
  doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(11,29,58);
  doc.text(userName, M+10, y+32);
  doc.text(contrato, M+230, y+32);
  doc.setFontSize(9); doc.text(fechaEmision, M+330, y+32);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(130,150,185);
  doc.text('Documento generado por el Sistema de Control de Transporte CADASA.', M+10, y+52);
  y += 72;

  // Totales
  const totalViajes = rows.length;
  const mCounts = {};
  rows.forEach(r => {
    const k = MESES[extractMonthIndexFromRow(r)]||"SIN FECHA";
    mCounts[k] = (mCounts[k]||0)+1;
  });
  const meses = Object.keys(mCounts).length;

  const boxes = [
    ['Total de Viajes Registrados', String(totalViajes)],
    ['Meses con Actividad', String(meses)],
    ['Promedio Viajes / Mes', String(meses?Math.round(totalViajes/meses):0)]
  ];
  const bw = (PW-M*2)/3;
  boxes.forEach((b,i) => {
    const bx   = M + i*bw;
    const fill = [[11,29,58],[0,80,200],[0,120,80]][i];
    doc.setFillColor(...fill); doc.roundedRect(bx,y,bw-4,50,5,5,'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(18); doc.setTextColor(255,193,7);
    doc.text(b[1], bx+10, y+28);
    doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(200,220,255);
    doc.text(b[0], bx+10, y+42, {maxWidth:bw-20});
  });
  y += 60;

  // Tabla resumen por mes
  doc.setFillColor(11,29,58); doc.rect(M,y,PW-M*2,20,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,193,7);
  doc.text('ACTIVIDAD MENSUAL', M+8, y+13); y += 20;

  const monthKeys = Object.keys(mCounts).sort((a,b) => {
    const ia=MESES.indexOf(a), ib=MESES.indexOf(b);
    if(ia===-1&&ib===-1) return a.localeCompare(b);
    if(ia===-1) return 1; if(ib===-1) return -1; return ia-ib;
  });
  const mHead = ['Mes','Viajes'];
  const mBody = monthKeys.map(m => [m, String(mCounts[m])]);
  mBody.push([
    {content:'TOTAL', styles:{fontStyle:'bold',fillColor:[11,29,58],textColor:[255,193,7]}},
    {content:String(totalViajes), styles:{fontStyle:'bold',fillColor:[11,29,58],textColor:[255,193,7]}}
  ]);

  doc.autoTable({
    head:[mHead], body:mBody, startY:y, theme:'striped',
    headStyles:{fillColor:[30,60,110],textColor:[255,255,255],fontStyle:'bold',fontSize:8.5},
    bodyStyles:{fontSize:9}, alternateRowStyles:{fillColor:[248,250,255]},
    margin:{left:M,right:M}, didDrawPage:drawFooter
  });

  doc.addPage();
  y = 40;

  // Tabla detalle
  if (!visHead.length || !rows.length) {
    const tp = doc.internal.getNumberOfPages();
    for(let i=1;i<=tp;i++){doc.setPage(i);drawFooter();}
    doc.save(`CADASA_informe_${contrato}_${anio}.pdf`);
    return;
  }

  doc.setFillColor(11,29,58); doc.rect(M,y,PW-M*2,20,'F');
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(255,193,7);
  doc.text('REGISTRO DETALLADO DE VIAJES', M+8, y+13); y += 20;

  const pdfH = visHead.map(getLabel);

  const grouped2 = {};
  rows.forEach(r => {
    const mi = extractMonthIndexFromRow(r);
    if(!grouped2[mi]) grouped2[mi]=[];
    grouped2[mi].push(r);
  });
  const keys2   = Object.keys(grouped2).map(k=>parseInt(k,10)).sort((a,b)=>a-b);
  const tBody   = [];
  let   grand   = 0;

  keys2.forEach(mIdx => {
    const mn    = MESES[mIdx]||"SIN FECHA";
    const mRows = grouped2[mIdx];
    grand += mRows.length;
    tBody.push([{content:mn, colSpan:pdfH.length,
      styles:{fillColor:[235,242,255],textColor:[0,50,150],fontStyle:'bold',fontSize:8}}]);
    mRows.forEach(r => tBody.push(visIdx.map(origIdx => String(r[origIdx]??""))));
    tBody.push([{content:`Subtotal ${mn}: ${mRows.length} viajes`, colSpan:pdfH.length,
      styles:{fillColor:[227,242,253],textColor:[0,102,255],fontStyle:'bold',halign:'right',fontSize:7.5}}]);
  });
  tBody.push([{content:`TOTAL: ${grand} viajes registrados`, colSpan:pdfH.length,
    styles:{fillColor:[11,29,58],textColor:[255,193,7],fontStyle:'bold',halign:'right',fontSize:9}}]);

  doc.autoTable({
    head:[pdfH], body:tBody, startY:y, theme:'striped',
    headStyles:{fillColor:[30,60,110],textColor:[255,255,255],fontStyle:'bold',fontSize:8},
    bodyStyles:{fontSize:7.5}, alternateRowStyles:{fillColor:[250,252,255]},
    margin:{left:M,right:M}, didDrawPage:drawFooter
  });

  const tp = doc.internal.getNumberOfPages();
  for(let i=1;i<=tp;i++){doc.setPage(i);drawFooter();}
  doc.save(`CADASA_informe_contrato_${contrato}_${anio}.pdf`);
}

// ─────────────────────────────────────────────
//  UTILIDADES
// ─────────────────────────────────────────────
function escHtml(str) {
  if(str===null||str===undefined) return'';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function refreshData() {
  if(GLOBAL.currentContrato) fetchAndFilterData(GLOBAL.currentContrato);
}
