<!DOCTYPE html>
<html>
<head>
  <title>Mi Página con Datos</title>
</head>
<body>

<h2>Datos desde Google Sheets</h2>
<table border="1" id="tabla"></table>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vTetXGOATrxj96K0hLQWJsfrYtqX9xuigKzlRqnftVx6K3hgjbJP-Qy1CUl8TeY5_G_KnpPyF72RnSH/pub?gid=1482702797&single=true&output=csv")
  .then(response => response.text())
  .then(data => {
    const filas = data.split("\n");
    let tablaHTML = "";

    filas.forEach(fila => {
      tablaHTML += "<tr>";
      fila.split(",").forEach(celda => {
        tablaHTML += "<td>" + celda + "</td>";
      });
      tablaHTML += "</tr>";
    });

    document.getElementById("tabla").innerHTML = tablaHTML;
  });
</script>

</body>
</html>
